components:
    vivarium_public_health:
        results:
            - DiseaseObserver("maternal_disorders") # Run 1
            - DiseaseObserver("maternal_hemorrhage") # Run 2

    vivarium_gates_nutrition_optimization:
        components:
            - Population() # Run 1
            - Pregnancy() # Run 1
            - UntrackNotPregnant() # Run 1
            - MaternalDisorders() # Run 1
            - MaternalHemorrhage() # Run 2
            - MaternalMortality() # Run 1
            # - BackgroundMorbidity() # NA
            - Hemoglobin() # Run 2
            - Anemia() # Run 2
            - MaternalBMIExposure() # Run 2
            - MaternalInterventions() # Run 3
            - ResultsStratifier() # Run 1
            - PregnancyObserver() # Run 1
            - PregnancyOutcomeObserver() # Run 1
            - BirthObserver() # Run 3
            - MaternalMortalityObserver() # Run 1
            - DisabilityObserver() # Run 2
            - AnemiaObserver() # Run 2
            - MaternalBMIObserver() # Run 2
            - MaternalInterventionObserver() # Run 3

configuration:
    input_data:
        input_draw_number: 0
        # artifact_path: /mnt/team/simulation_science/pub/models/vivarium_gates_nutrition_optimization/artifacts/mean/pakistan.hdf
    interpolation:
        order: 0
        extrapolate: True
    intervention:
        scenario: baseline
        # scenario: zero_coverage
        # scenario: mms
        # scenario: ifa
        # scenario: targeted_bep_ifa
        # scenario: targeted_bep_mms
    randomness:
        map_size: 1_000_000
        key_columns: ['entrance_time', 'age']
        random_seed: 0
    time:
        start:
            year: 2025
            month: 1
            day: 1
        end:
            year: 2025
            month: 12
            day: 31
        # SBACHMEI put back to 7 days
        # step_size: 7 # Days
        step_size: 28
    population:
        population_size: 20_000
        initialization_age_min: 10
        initialization_age_max: 54
        include_sex: "Female"
    stratification:
        default:
            - 'age_group'
        excluded_categories:
            age_group:
                - '60_to_64'
                - '65_to_69'
                - '70_to_74'
                - '75_to_79'
                - '80_to_84'
                - '85_to_89'
                - '90_to_94'
                - '95_plus'
            cause_of_death:
                - 'other_causes'
            disability:
                - 'maternal_hemorrhage'
                - 'parturition'
                - 'postpartum'
                - 'pregnant'
